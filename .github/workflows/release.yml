name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.22.4"

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      # Linux amd64
      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o hotelmp3-linux-amd64 ./...

      # Linux arm64
      - name: Build Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o hotelmp3-linux-arm64 ./...

      # Windows amd64 (cross-compile from Linux)
      - name: Build Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H=windowsgui" -o HotelMp3-windows-amd64.exe ./...

      # Windows arm64
      - name: Build Windows arm64
        run: |
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w -H=windowsgui" -o HotelMp3-windows-arm64.exe ./...

      # macOS amd64
      - name: Build macOS amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o hotelmp3-macos-amd64 ./...

      # macOS arm64 (Apple Silicon)
      - name: Build macOS arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o hotelmp3-macos-arm64 ./...

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hotelmp3-linux-amd64
            hotelmp3-linux-arm64
            HotelMp3-windows-amd64.exe
            HotelMp3-windows-arm64.exe
            hotelmp3-macos-amd64
            hotelmp3-macos-arm64
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
